<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>变异吧！人类！ · MVP</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      overflow: hidden;
    }

    /* ====== 封面页（第一层） ====== */
    #cover-screen {
      display: none;
      width: 100vw; height: 100vh;
      position: relative;
      overflow: hidden;
    }
    #cover-screen.show { display: block; }

    /* 背景层：CSS 渐变兜底（AI 背景图用 background-image 覆盖） */
    .cover-bg {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse at 30% 20%, rgba(56,189,248,0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 70% 60%, rgba(129,140,248,0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(74,222,128,0.05) 0%, transparent 40%),
        radial-gradient(ellipse at center, #0f172a 0%, #0a0a1a 100%);
      z-index: 0;
    }
    /* AI 背景图叠加层（用 JS 动态设置 background-image） */
    .cover-bg-image {
      position: absolute; inset: 0;
      background-size: cover;
      background-position: center;
      opacity: 0.45;
      z-index: 1;
      image-rendering: pixelated;
    }

    /* 粒子容器 */
    .cover-particles {
      position: absolute; inset: 0;
      z-index: 2;
      pointer-events: none;
    }
    .cover-particle {
      position: absolute;
      border-radius: 50%;
      animation: float-up linear infinite;
    }
    @keyframes float-up {
      0%   { transform: translateY(0) scale(0); opacity: 0; }
      5%   { opacity: 0.7; }
      90%  { opacity: 0.2; }
      100% { transform: translateY(-105vh) scale(1); opacity: 0; }
    }

    /* DNA 双螺旋装饰（CSS 纯绘） */
    .cover-dna {
      position: absolute;
      z-index: 1;
      pointer-events: none;
    }
    .cover-dna.left  { left: -40px; top: 10%; width: 160px; height: 320px; }
    .cover-dna.right { right: -40px; bottom: 10%; width: 160px; height: 320px; }

    /* 前景内容 */
    .cover-content {
      position: relative; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100%; padding: 40px 20px;
    }

    /* 吉祥物 */
    .cover-mascot {
      width: 120px; height: 120px;
      margin-bottom: 8px;
      opacity: 0.85;
      animation: mascot-float 4s ease-in-out infinite;
    }
    .cover-mascot img {
      width: 100%; height: 100%;
      object-fit: contain;
      image-rendering: pixelated;
    }
    @keyframes mascot-float {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-8px); }
    }

    /* 标题 */
    .cover-title {
      font-size: 42px; font-weight: 800;
      color: #e2e8f0;
      letter-spacing: 6px;
      margin-bottom: 2px;
      text-shadow:
        0 0 10px rgba(56,189,248,0.5),
        0 0 40px rgba(56,189,248,0.25),
        0 0 80px rgba(129,140,248,0.15);
      animation: title-breathe 3s ease-in-out infinite;
    }
    @keyframes title-breathe {
      0%, 100% { text-shadow: 0 0 10px rgba(56,189,248,0.5), 0 0 40px rgba(56,189,248,0.25); }
      50%      { text-shadow: 0 0 18px rgba(56,189,248,0.7), 0 0 60px rgba(56,189,248,0.4), 0 0 100px rgba(129,140,248,0.2); }
    }

    .cover-subtitle {
      font-size: 15px; color: #7dd3fc;
      letter-spacing: 4px;
      margin-bottom: 12px;
    }

    /* Slogan */
    .cover-slogan {
      font-size: 14px; color: #64748b;
      letter-spacing: 1px;
      margin-bottom: 40px;
      font-style: italic;
    }

    /* 按钮组 */
    .cover-buttons {
      display: flex; flex-direction: column;
      align-items: center; gap: 12px;
    }
    .btn-cover-primary {
      padding: 14px 56px; font-size: 18px; font-weight: 700;
      color: #0f172a;
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      border: none; border-radius: 12px;
      cursor: pointer; letter-spacing: 2px;
      box-shadow: 0 0 20px rgba(56,189,248,0.3);
      transition: opacity 0.2s, transform 0.1s, box-shadow 0.3s;
      animation: btn-pulse 2.5s ease-in-out infinite;
    }
    .btn-cover-primary:hover {
      opacity: 0.92;
      box-shadow: 0 0 35px rgba(56,189,248,0.5), 0 0 70px rgba(129,140,248,0.2);
    }
    .btn-cover-primary:active { transform: scale(0.97); }
    @keyframes btn-pulse {
      0%, 100% { box-shadow: 0 0 20px rgba(56,189,248,0.3); }
      50%      { box-shadow: 0 0 35px rgba(56,189,248,0.55), 0 0 65px rgba(129,140,248,0.2); }
    }

    .btn-cover-secondary {
      padding: 10px 32px; font-size: 14px; font-weight: 600;
      color: #94a3b8;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px; cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }
    .btn-cover-secondary:hover {
      color: #e2e8f0;
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.25);
    }

    .cover-footer {
      position: absolute; bottom: 20px;
      font-size: 11px; color: #334155;
      letter-spacing: 1px;
    }

    /* ====== 登录/注册页（第二层：叠加在封面之上） ====== */
    #auth-screen {
      display: none;
      position: fixed; inset: 0;
      z-index: 100;
      justify-content: center; align-items: center;
    }
    #auth-screen.show { display: flex; }

    /* 半透明遮罩 */
    .auth-backdrop {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(2px);
      z-index: 0;
    }

    .auth-panel {
      position: relative; z-index: 1;
      text-align: center;
      background: rgba(15,23,42,0.92);
      border: 1px solid rgba(100,200,255,0.2);
      border-radius: 16px;
      padding: 36px 40px 28px; min-width: 380px;
      backdrop-filter: blur(8px);
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }
    .auth-panel h1 { font-size: 28px; color: #7dd3fc; margin-bottom: 4px; letter-spacing: 2px; }
    .auth-panel .subtitle { font-size: 13px; color: #64748b; margin-bottom: 24px; }

    /* 返回按钮 */
    .auth-back-btn {
      position: absolute; top: 12px; left: 16px;
      background: transparent; border: none;
      color: #64748b; font-size: 14px;
      cursor: pointer; padding: 4px 8px;
      transition: color 0.2s;
    }
    .auth-back-btn:hover { color: #e2e8f0; }

    /* tab 切换 */
    .auth-tabs {
      display: flex; gap: 0; margin-bottom: 20px;
      border: 1px solid rgba(100,200,255,0.2); border-radius: 8px;
      overflow: hidden;
    }
    .auth-tab {
      flex: 1; padding: 8px 0; font-size: 15px; font-weight: 600;
      cursor: pointer; border: none;
      background: transparent; color: #64748b;
      transition: background 0.2s, color 0.2s;
    }
    .auth-tab.active {
      background: rgba(56,189,248,0.15); color: #38bdf8;
    }
    .auth-tab:not(.active):hover { color: #94a3b8; }

    .auth-panel label { display: block; font-size: 14px; color: #94a3b8; margin-bottom: 8px; text-align: left; }
    .auth-panel input {
      width: 100%; padding: 10px 14px; font-size: 16px;
      border: 1px solid rgba(100,200,255,0.3); border-radius: 8px;
      background: rgba(0,0,0,0.4); color: #e2e8f0; outline: none;
      transition: border-color 0.2s;
    }
    .auth-panel input:focus { border-color: #38bdf8; }
    .auth-panel .btn-auth {
      width: 100%; margin-top: 16px; padding: 12px 0; font-size: 17px; font-weight: 600;
      color: #0f172a; background: linear-gradient(135deg, #38bdf8, #818cf8);
      border: none; border-radius: 8px; cursor: pointer; letter-spacing: 1px;
      transition: opacity 0.2s, transform 0.1s;
    }
    .auth-panel .btn-auth:hover { opacity: 0.9; }
    .auth-panel .btn-auth:active { transform: scale(0.97); }
    .auth-panel .btn-auth:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .auth-panel .hint { margin-top: 14px; font-size: 12px; color: #475569; }
    .auth-panel .error-msg {
      display: none; margin-top: 10px; font-size: 13px;
      color: #f87171; min-height: 20px;
    }
    .auth-panel .error-msg.show { display: block; }

    /* ====== 存档槽位页 ====== */
    #slots-screen {
      display: none;
      width: 100vw; height: 100vh;
      justify-content: center; align-items: center;
      background: radial-gradient(ellipse at center, #16213e 0%, #0a0a1a 100%);
    }
    #slots-screen.show { display: flex; }
    .slots-panel {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(100,200,255,0.2);
      border-radius: 16px;
      padding: 32px 40px 24px;
      backdrop-filter: blur(4px);
      min-width: 420px;
      text-align: center;
    }
    .slots-panel h2 { font-size: 22px; color: #7dd3fc; margin-bottom: 2px; }
    .slots-panel .slots-username { font-size: 14px; color: #94a3b8; margin-bottom: 20px; }
    .slots-row {
      display: flex; gap: 14px; justify-content: center; margin-bottom: 16px;
    }
    .slot-card {
      width: 120px; height: 150px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(100,200,255,0.15);
      border-radius: 12px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 8px; cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .slot-card:hover {
      border-color: rgba(125,211,252,0.5);
      background: rgba(125,211,252,0.08);
    }
    .slot-card .slot-empty-icon { font-size: 32px; color: #475569; }
    .slot-card .slot-add-text { font-size: 12px; color: #64748b; }
    .slot-card .slot-variant-name { font-size: 15px; color: #e2e8f0; font-weight: 600; }
    .slot-card .slot-level { font-size: 12px; color: #7dd3fc; }
    .slot-card .slot-delete {
      font-size: 11px; color: #b91c1c; margin-top: 4px;
      background: transparent; border: none; cursor: pointer;
    }
    .slot-card .slot-delete:hover { text-decoration: underline; }
    .slots-logout {
      margin-top: 8px; background: transparent; border: none;
      color: #64748b; font-size: 13px; cursor: pointer;
    }
    .slots-logout:hover { color: #e2e8f0; }

    /* 删除确认弹窗 */
    .confirm-overlay {
      display: none;
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      justify-content: center; align-items: center;
      z-index: 5;
    }
    .confirm-overlay.show { display: flex; }
    .confirm-dialog {
      background: rgba(20,25,40,0.95);
      border: 1px solid rgba(231,76,60,0.3);
      border-radius: 14px;
      padding: 28px 36px 24px;
      text-align: center;
      backdrop-filter: blur(6px);
      max-width: 360px;
    }
    .confirm-dialog .confirm-icon {
      font-size: 36px; margin-bottom: 8px;
    }
    .confirm-dialog .confirm-title {
      font-size: 16px; font-weight: 600;
      color: #e2e8f0; margin-bottom: 6px;
    }
    .confirm-dialog .confirm-msg {
      font-size: 13px; color: #94a3b8;
      line-height: 1.6; margin-bottom: 20px;
    }
    .confirm-dialog .confirm-buttons {
      display: flex; gap: 12px;
      justify-content: center;
    }
    .confirm-dialog .confirm-buttons button {
      padding: 8px 28px; font-size: 14px; font-weight: 600;
      border: none; border-radius: 8px; cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .confirm-dialog .confirm-buttons button:active { transform: scale(0.97); }
    .confirm-dialog .btn-confirm-yes {
      color: #fff;
      background: linear-gradient(135deg, #e74c3c, #c0392b);
    }
    .confirm-dialog .btn-confirm-yes:hover { opacity: 0.9; }
    .confirm-dialog .btn-confirm-no {
      color: #94a3b8;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .confirm-dialog .btn-confirm-no:hover { color: #e2e8f0; }

    /* ====== 变异体创建页 ====== */
    #variant-create-screen {
      display: none;
      width: 100vw; height: 100vh;
      justify-content: center; align-items: center;
      background: radial-gradient(ellipse at center, #16213e 0%, #0a0a1a 100%);
    }
    #variant-create-screen.show { display: flex; }
    .create-panel {
      display: flex; gap: 28px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(100,200,255,0.2);
      border-radius: 16px;
      padding: 28px 32px 24px;
      backdrop-filter: blur(4px);
    }
    .create-left {
      display: flex; flex-direction: column;
      align-items: center; gap: 14px;
    }
    .create-left canvas {
      background: rgba(0,0,0,0.3);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .create-left .create-name-label {
      font-size: 13px; color: #94a3b8; align-self: flex-start;
    }
    .create-left input {
      width: 180px; padding: 8px 12px; font-size: 15px;
      border: 1px solid rgba(100,200,255,0.3); border-radius: 8px;
      background: rgba(0,0,0,0.4); color: #e2e8f0; outline: none;
      transition: border-color 0.2s;
    }
    .create-left input:focus { border-color: #38bdf8; }

    .create-right {
      display: flex; flex-direction: column;
      min-width: 240px;
    }
    .create-right h3 {
      font-size: 18px; color: #7dd3fc; margin-bottom: 4px;
    }
    .create-right .create-subtitle {
      font-size: 12px; color: #64748b; margin-bottom: 18px;
    }
    .create-design-slots {
      display: flex; flex-direction: column; gap: 10px;
      flex: 1;
    }
    .create-design-slot {
      flex: 1;
      background: rgba(255,255,255,0.03);
      border: 1px dashed rgba(100,200,255,0.15);
      border-radius: 10px;
      display: flex; align-items: center;
      justify-content: center;
      font-size: 13px; color: #475569;
      min-height: 56px;
    }
    .create-actions {
      display: flex; gap: 10px; margin-top: 14px;
    }
    .create-actions button {
      flex: 1; padding: 10px 0; font-size: 15px; font-weight: 600;
      border: none; border-radius: 8px; cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .create-actions button:active { transform: scale(0.97); }
    .create-actions button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-create-confirm {
      color: #0f172a;
      background: linear-gradient(135deg, #38bdf8, #818cf8);
    }
    .btn-create-cancel {
      color: #94a3b8;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .btn-create-cancel:hover { color: #e2e8f0; }
    .create-error {
      display: none; margin-top: 8px; font-size: 12px;
      color: #f87171; text-align: center;
    }
    .create-error.show { display: block; }

    /* ====== 暂停覆盖层 ====== */
    #pause-screen {
      display: none;
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.75);
      justify-content: center; align-items: center;
      z-index: 20;
    }
    #pause-screen.show { display: flex; }
    .pause-panel {
      text-align: center;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(100,200,255,0.2);
      border-radius: 16px;
      padding: 32px 48px 28px;
      backdrop-filter: blur(4px);
    }
    .pause-panel h2 {
      font-size: 24px; color: #7dd3fc; margin-bottom: 24px;
    }
    .pause-panel button {
      display: block; width: 100%; margin-top: 12px;
      padding: 12px 0; font-size: 16px; font-weight: 600;
      border: none; border-radius: 8px; cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .pause-panel button:active { transform: scale(0.97); }
    .pause-panel .btn-resume {
      color: #0f172a;
      background: linear-gradient(135deg, #38bdf8, #818cf8);
    }
    .pause-panel .btn-save-quit {
      color: #e2e8f0;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
    }
    .pause-panel .btn-save-quit:hover { background: rgba(255,255,255,0.14); }

    /* ====== 游戏容器 ====== */
    #game-screen {
      display: none;
      width: 100vw; height: 100vh;
      justify-content: center; align-items: center;
      position: relative;
    }
    #game-container { width: 800px; height: 600px; position: relative; }
    canvas { display: block; }

    /* ====== 进化选择面板（覆盖在游戏上方） ====== */
    #evolution-overlay {
      display: none;
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.75);
      justify-content: center; align-items: center;
      z-index: 10;
    }
    #evolution-overlay.show { display: flex; }
    .evolution-inner {
      text-align: center;
      max-width: 780px;
    }
    .evolution-inner h2 {
      font-size: 26px; color: #7dd3fc; margin-bottom: 6px;
    }
    .evolution-inner .sub {
      font-size: 13px; color: #64748b; margin-bottom: 20px;
    }
    .evo-cards {
      display: flex; gap: 16px; justify-content: center;
    }
    .evo-card {
      flex: 1;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 18px 14px 14px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, transform 0.1s;
      min-width: 200px;
    }
    .evo-card:hover {
      border-color: rgba(125,211,252,0.5);
      background: rgba(125,211,252,0.1);
    }
    .evo-card:active { transform: scale(0.97); }
    .evo-card .type-badge {
      display: inline-block;
      font-size: 12px;
      padding: 2px 10px;
      border-radius: 10px;
      margin-bottom: 8px;
    }
    .evo-card .type-badge.food  { background: rgba(241,196,15,0.2); color: #f1c40f; }
    .evo-card .type-badge.drug  { background: rgba(231,76,60,0.2); color: #e74c3c; }
    .evo-card .type-badge.experiment { background: rgba(155,89,182,0.2); color: #9b59b6; }
    .evo-card .evo-name {
      font-size: 18px; color: #e2e8f0; margin-bottom: 10px; font-weight: 600;
    }
    .evo-card .evo-buff {
      font-size: 12px; color: #4ade80; margin-bottom: 4px;
    }
    .evo-card .evo-debuff {
      font-size: 12px; color: #f87171; margin-bottom: 8px;
    }
    .evo-card .evo-hint {
      font-size: 11px; color: #475569;
    }

    /* ====== 结算页 ====== */
    #summary-screen {
      display: none;
      width: 100vw; height: 100vh;
      justify-content: center; align-items: center;
      background: radial-gradient(ellipse at center, #16213e 0%, #0a0a1a 100%);
    }
    #summary-screen.show { display: flex; }
    .summary-panel {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(100,200,255,0.2);
      border-radius: 16px;
      padding: 32px 36px 28px;
      max-width: 820px;
      width: 90vw;
      color: #e2e8f0;
    }
    .summary-panel h2 {
      text-align: center;
      font-size: 26px;
      color: #4ade80;
      margin-bottom: 4px;
    }
    .summary-panel .subtitle {
      text-align: center;
      font-size: 13px;
      color: #64748b;
      margin-bottom: 24px;
    }
    .summary-body {
      display: flex;
      gap: 28px;
    }
    .summary-left {
      flex-shrink: 0;
      text-align: center;
    }
    .summary-left canvas {
      background: rgba(0,0,0,0.3);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .summary-left .form-label {
      margin-top: 8px;
      font-size: 12px;
      color: #64748b;
    }
    .summary-right {
      flex: 1;
      min-width: 0;
    }
    .summary-right .section-title {
      font-size: 14px;
      font-weight: 600;
      color: #7dd3fc;
      margin-bottom: 6px;
      margin-top: 12px;
    }
    .summary-right .section-title:first-child { margin-top: 0; }
    .evo-path {
      font-size: 14px;
      color: #f1c40f;
      margin-bottom: 10px;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px 16px;
      font-size: 13px;
      color: #94a3b8;
    }
    .stats-grid .stat-val {
      color: #e2e8f0;
      font-weight: 600;
    }
    .report-text {
      font-size: 12px;
      color: #c0c8d0;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 12px 14px;
      white-space: pre-line;
      line-height: 1.7;
      max-height: 200px;
      overflow-y: auto;
      font-family: 'Courier New', 'PingFang SC', monospace;
      margin-top: 8px;
    }
    .summary-actions {
      text-align: center;
      margin-top: 22px;
    }
    .summary-actions button {
      padding: 10px 40px;
      font-size: 16px; font-weight: 600;
      color: #0f172a;
      background: linear-gradient(135deg, #4ade80, #38bdf8);
      border: none; border-radius: 8px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: opacity 0.2s, transform 0.1s;
    }
    .summary-actions button:hover { opacity: 0.9; }
    .summary-actions button:active { transform: scale(0.97); }
  </style>
</head>
<body>
  <!-- ====== 第一层：封面页 ====== -->
  <div id="cover-screen" class="show">
    <!-- 背景 -->
    <div class="cover-bg"></div>
    <div class="cover-bg-image" id="cover-bg-image"></div>
    <!-- 粒子 -->
    <div class="cover-particles" id="cover-particles"></div>
    <!-- DNA 装饰 -->
    <canvas class="cover-dna left" id="cover-dna-left"></canvas>
    <canvas class="cover-dna right" id="cover-dna-right"></canvas>

    <!-- 前景内容 -->
    <div class="cover-content">
      <!-- 吉祥物（可用 AI 生成图片替换） -->
      <div class="cover-mascot" id="cover-mascot">
        <canvas id="cover-mascot-canvas" width="120" height="120"></canvas>
      </div>

      <h1 class="cover-title">🧬 变异吧！人类！</h1>
      <p class="cover-subtitle">AI 变异进化肉鸽</p>
      <p class="cover-slogan">每一场实验，都是独一无二的进化</p>

      <div class="cover-buttons">
        <button class="btn-cover-primary" id="btn-new-experiment">🔬 开始实验</button>
        <button class="btn-cover-secondary" id="btn-existing-account">🔑 已有账户</button>
      </div>
    </div>

    <p class="cover-footer">v0.2.0 · 实验室原型</p>
  </div>

  <!-- ====== 第二层：登录/注册页（叠加在封面之上） ====== -->
  <div id="auth-screen">
    <div class="auth-backdrop"></div>
    <div class="auth-panel">
      <button class="auth-back-btn" id="btn-auth-back">← 返回</button>
      <h1>🧬 变异吧！人类！</h1>
      <p class="subtitle" id="auth-subtitle">登录或注册一个账户</p>

      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">🔑 登录</button>
        <button class="auth-tab" data-tab="register">🆕 注册</button>
      </div>

      <label for="auth-username">玩家用户名</label>
      <input id="auth-username" type="text" maxlength="12" placeholder="输入你的用户名" autocomplete="off" />
      <button id="btn-auth" class="btn-auth">登 录</button>
      <p class="error-msg" id="auth-error"></p>
      <p class="hint">WASD 移动 · 鼠标点击攻击 · 击杀敌人进化</p>
    </div>
  </div>

  <!-- 存档槽位页 -->
  <div id="slots-screen">
    <div class="slots-panel">
      <h2>🧬 档案选择</h2>
      <p class="slots-username">玩家：<span id="slots-username">---</span></p>
      <div class="slots-row" id="slots-row"></div>
      <button class="slots-logout" id="btn-slots-logout">退出登录</button>
    </div>
    <!-- 删除确认弹窗 -->
    <div class="confirm-overlay" id="delete-confirm-overlay">
      <div class="confirm-dialog">
        <div class="confirm-icon">⚠️</div>
        <div class="confirm-title">删除存档</div>
        <div class="confirm-msg" id="delete-confirm-msg"></div>
        <div class="confirm-buttons">
          <button class="btn-confirm-no" id="btn-confirm-no">我再想想</button>
          <button class="btn-confirm-yes" id="btn-confirm-yes">确认删除</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 变异体创建页 -->
  <div id="variant-create-screen">
    <div class="create-panel">
      <!-- 左侧：预览 + 命名 -->
      <div class="create-left">
        <canvas id="create-preview-canvas" width="160" height="180"></canvas>
        <label class="create-name-label" for="create-variant-name">变异体命名</label>
        <input id="create-variant-name" type="text" maxlength="12" placeholder="为变异体起名" autocomplete="off" />
      </div>

      <!-- 右侧：设计项（先留空） -->
      <div class="create-right">
        <h3>🧬 初始设计</h3>
        <p class="create-subtitle">实验前的最后配置（开发中）</p>
        <div class="create-design-slots">
          <div class="create-design-slot">🔮 初始变异倾向（即将开放）</div>
          <div class="create-design-slot">🛡️ 初始特长（即将开放）</div>
          <div class="create-design-slot">🎨 外观选项（即将开放）</div>
        </div>
        <div class="create-actions">
          <button class="btn-create-cancel" id="btn-create-cancel">返回</button>
          <button class="btn-create-confirm" id="btn-create-confirm">🔬 开始实验</button>
        </div>
        <p class="create-error" id="create-error"></p>
      </div>
    </div>
  </div>

  <!-- 游戏画面 -->
  <div id="game-screen">
    <div id="game-container"></div>
    <!-- 暂停覆盖层 -->
    <div id="pause-screen">
      <div class="pause-panel">
        <h2>⏸️ 实验暂停</h2>
        <button class="btn-resume" id="btn-resume">▶ 继续实验</button>
        <button class="btn-save-quit" id="btn-save-quit">💾 保存并退出</button>
      </div>
    </div>
    <!-- 进化选择覆盖层 -->
    <div id="evolution-overlay">
      <div class="evolution-inner">
        <h2>🧬 进化选择</h2>
        <p class="sub">选择一个变异方向</p>
        <div id="evo-cards" class="evo-cards"></div>
      </div>
    </div>
  </div>

  <!-- 结算页 -->
  <div id="summary-screen">
    <div class="summary-panel">
      <h2>🧬 实验结束</h2>
      <p class="subtitle" id="summary-subtitle">实验体培养完成</p>
      <div class="summary-body">
        <div class="summary-left">
          <canvas id="final-canvas" width="180" height="200"></canvas>
          <p class="form-label">变异体最终形态</p>
        </div>
        <div class="summary-right">
          <p class="section-title">进化路线</p>
          <p class="evo-path" id="evo-path">—</p>

          <p class="section-title">最终属性</p>
          <div class="stats-grid" id="stats-grid"></div>

          <p class="section-title">实验报告</p>
          <div class="report-text" id="report-text"></div>
        </div>
      </div>
      <div class="summary-actions">
        <button id="btn-restart">🔄 再开一局</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
