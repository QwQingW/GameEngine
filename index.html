<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>变异吧！人类！ · MVP</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      overflow: hidden;
    }

    /* ====== 登录页 ====== */
    #login-screen {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(ellipse at center, #16213e 0%, #0a0a1a 100%);
    }
    .login-panel {
      text-align: center;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(100,200,255,0.2);
      border-radius: 16px;
      padding: 48px 40px 36px;
      min-width: 380px;
      backdrop-filter: blur(4px);
    }
    .login-panel h1 {
      font-size: 28px;
      color: #7dd3fc;
      margin-bottom: 6px;
      letter-spacing: 2px;
    }
    .login-panel .subtitle {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 32px;
    }
    .login-panel label {
      display: block;
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 8px;
      text-align: left;
    }
    .login-panel input {
      width: 100%;
      padding: 10px 14px;
      font-size: 16px;
      border: 1px solid rgba(100,200,255,0.3);
      border-radius: 8px;
      background: rgba(0,0,0,0.4);
      color: #e2e8f0;
      outline: none;
      transition: border-color 0.2s;
    }
    .login-panel input:focus {
      border-color: #38bdf8;
    }
    .login-panel button {
      width: 100%;
      margin-top: 20px;
      padding: 12px 0;
      font-size: 17px;
      font-weight: 600;
      color: #0f172a;
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: opacity 0.2s, transform 0.1s;
    }
    .login-panel button:hover {
      opacity: 0.9;
    }
    .login-panel button:active {
      transform: scale(0.97);
    }
    .login-panel .hint {
      margin-top: 14px;
      font-size: 12px;
      color: #475569;
    }

    /* ====== 游戏容器 ====== */
    #game-screen {
      display: none;
      width: 100vw;
      height: 100vh;
      justify-content: center;
      align-items: center;
    }
    #game-container {
      width: 800px;
      height: 600px;
      position: relative;
    }
    canvas { display: block; }
  </style>
</head>
<body>
  <!-- 登录页 -->
  <div id="login-screen">
    <div class="login-panel">
      <h1>🧬 变异吧！人类！</h1>
      <p class="subtitle">AI 驱动的变异进化肉鸽 · 最小原型</p>
      <label for="nickname">实验员代号</label>
      <input
        id="nickname"
        type="text"
        maxlength="8"
        placeholder="请输入你的代号"
        autocomplete="off"
      />
      <button id="btn-start">开 始 实 验</button>
      <p class="hint">WASD 移动 · 鼠标点击攻击 · 击杀敌人进化</p>
    </div>
  </div>

  <!-- 游戏画面（初始隐藏） -->
  <div id="game-screen">
    <div id="game-container"></div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
