<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>变异吧！人类！ · MVP</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      overflow: hidden;
    }

    /* ====== 登录页 ====== */
    #login-screen {
      width: 100vw; height: 100vh;
      display: flex; justify-content: center; align-items: center;
      background: radial-gradient(ellipse at center, #16213e 0%, #0a0a1a 100%);
    }
    .login-panel {
      text-align: center;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(100,200,255,0.2);
      border-radius: 16px;
      padding: 48px 40px 36px; min-width: 380px;
      backdrop-filter: blur(4px);
    }
    .login-panel h1 { font-size: 28px; color: #7dd3fc; margin-bottom: 6px; letter-spacing: 2px; }
    .login-panel .subtitle { font-size: 13px; color: #64748b; margin-bottom: 32px; }
    .login-panel label { display: block; font-size: 14px; color: #94a3b8; margin-bottom: 8px; text-align: left; }
    .login-panel input {
      width: 100%; padding: 10px 14px; font-size: 16px;
      border: 1px solid rgba(100,200,255,0.3); border-radius: 8px;
      background: rgba(0,0,0,0.4); color: #e2e8f0; outline: none;
      transition: border-color 0.2s;
    }
    .login-panel input:focus { border-color: #38bdf8; }
    .login-panel button {
      width: 100%; margin-top: 20px; padding: 12px 0; font-size: 17px; font-weight: 600;
      color: #0f172a; background: linear-gradient(135deg, #38bdf8, #818cf8);
      border: none; border-radius: 8px; cursor: pointer; letter-spacing: 1px;
      transition: opacity 0.2s, transform 0.1s;
    }
    .login-panel button:hover { opacity: 0.9; }
    .login-panel button:active { transform: scale(0.97); }
    .login-panel .hint { margin-top: 14px; font-size: 12px; color: #475569; }

    /* ====== 游戏容器 ====== */
    #game-screen {
      display: none;
      width: 100vw; height: 100vh;
      justify-content: center; align-items: center;
      position: relative;
    }
    #game-container { width: 800px; height: 600px; position: relative; }
    canvas { display: block; }

    /* ====== 进化选择面板（覆盖在游戏上方） ====== */
    #evolution-overlay {
      display: none;
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.75);
      justify-content: center; align-items: center;
      z-index: 10;
    }
    #evolution-overlay.show { display: flex; }
    .evolution-inner {
      text-align: center;
      max-width: 780px;
    }
    .evolution-inner h2 {
      font-size: 26px; color: #7dd3fc; margin-bottom: 6px;
    }
    .evolution-inner .sub {
      font-size: 13px; color: #64748b; margin-bottom: 20px;
    }
    .evo-cards {
      display: flex; gap: 16px; justify-content: center;
    }
    .evo-card {
      flex: 1;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 18px 14px 14px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, transform 0.1s;
      min-width: 200px;
    }
    .evo-card:hover {
      border-color: rgba(125,211,252,0.5);
      background: rgba(125,211,252,0.1);
    }
    .evo-card:active { transform: scale(0.97); }
    .evo-card .type-badge {
      display: inline-block;
      font-size: 12px;
      padding: 2px 10px;
      border-radius: 10px;
      margin-bottom: 8px;
    }
    .evo-card .type-badge.food  { background: rgba(241,196,15,0.2); color: #f1c40f; }
    .evo-card .type-badge.drug  { background: rgba(231,76,60,0.2); color: #e74c3c; }
    .evo-card .type-badge.experiment { background: rgba(155,89,182,0.2); color: #9b59b6; }
    .evo-card .evo-name {
      font-size: 18px; color: #e2e8f0; margin-bottom: 10px; font-weight: 600;
    }
    .evo-card .evo-buff {
      font-size: 12px; color: #4ade80; margin-bottom: 4px;
    }
    .evo-card .evo-debuff {
      font-size: 12px; color: #f87171; margin-bottom: 8px;
    }
    .evo-card .evo-hint {
      font-size: 11px; color: #475569;
    }

    /* ====== 结算页 ====== */
    #summary-screen {
      display: none;
      width: 100vw; height: 100vh;
      justify-content: center; align-items: center;
      background: radial-gradient(ellipse at center, #16213e 0%, #0a0a1a 100%);
    }
    #summary-screen.show { display: flex; }
    .summary-panel {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(100,200,255,0.2);
      border-radius: 16px;
      padding: 32px 36px 28px;
      max-width: 820px;
      width: 90vw;
      color: #e2e8f0;
    }
    .summary-panel h2 {
      text-align: center;
      font-size: 26px;
      color: #4ade80;
      margin-bottom: 4px;
    }
    .summary-panel .subtitle {
      text-align: center;
      font-size: 13px;
      color: #64748b;
      margin-bottom: 24px;
    }
    .summary-body {
      display: flex;
      gap: 28px;
    }
    .summary-left {
      flex-shrink: 0;
      text-align: center;
    }
    .summary-left canvas {
      background: rgba(0,0,0,0.3);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .summary-left .form-label {
      margin-top: 8px;
      font-size: 12px;
      color: #64748b;
    }
    .summary-right {
      flex: 1;
      min-width: 0;
    }
    .summary-right .section-title {
      font-size: 14px;
      font-weight: 600;
      color: #7dd3fc;
      margin-bottom: 6px;
      margin-top: 12px;
    }
    .summary-right .section-title:first-child { margin-top: 0; }
    .evo-path {
      font-size: 14px;
      color: #f1c40f;
      margin-bottom: 10px;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px 16px;
      font-size: 13px;
      color: #94a3b8;
    }
    .stats-grid .stat-val {
      color: #e2e8f0;
      font-weight: 600;
    }
    .report-text {
      font-size: 12px;
      color: #c0c8d0;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 12px 14px;
      white-space: pre-line;
      line-height: 1.7;
      max-height: 200px;
      overflow-y: auto;
      font-family: 'Courier New', 'PingFang SC', monospace;
      margin-top: 8px;
    }
    .summary-actions {
      text-align: center;
      margin-top: 22px;
    }
    .summary-actions button {
      padding: 10px 40px;
      font-size: 16px; font-weight: 600;
      color: #0f172a;
      background: linear-gradient(135deg, #4ade80, #38bdf8);
      border: none; border-radius: 8px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: opacity 0.2s, transform 0.1s;
    }
    .summary-actions button:hover { opacity: 0.9; }
    .summary-actions button:active { transform: scale(0.97); }
  </style>
</head>
<body>
  <!-- 登录页 -->
  <div id="login-screen">
    <div class="login-panel">
      <h1>🧬 变异吧！人类！</h1>
      <p class="subtitle">AI 驱动的变异进化肉鸽 · 最小原型</p>
      <label for="nickname">实验员代号</label>
      <input id="nickname" type="text" maxlength="8" placeholder="请输入你的代号" autocomplete="off" />
      <button id="btn-start">开 始 实 验</button>
      <p class="hint">WASD 移动 · 鼠标点击攻击 · 击杀敌人进化</p>
    </div>
  </div>

  <!-- 游戏画面 -->
  <div id="game-screen">
    <div id="game-container"></div>
    <!-- 进化选择覆盖层 -->
    <div id="evolution-overlay">
      <div class="evolution-inner">
        <h2>🧬 进化选择</h2>
        <p class="sub">选择一个变异方向</p>
        <div id="evo-cards" class="evo-cards"></div>
      </div>
    </div>
  </div>

  <!-- 结算页 -->
  <div id="summary-screen">
    <div class="summary-panel">
      <h2>🧬 实验结束</h2>
      <p class="subtitle" id="summary-subtitle">实验体培养完成</p>
      <div class="summary-body">
        <div class="summary-left">
          <canvas id="final-canvas" width="180" height="200"></canvas>
          <p class="form-label">变异体最终形态</p>
        </div>
        <div class="summary-right">
          <p class="section-title">进化路线</p>
          <p class="evo-path" id="evo-path">—</p>

          <p class="section-title">最终属性</p>
          <div class="stats-grid" id="stats-grid"></div>

          <p class="section-title">实验报告</p>
          <div class="report-text" id="report-text"></div>
        </div>
      </div>
      <div class="summary-actions">
        <button id="btn-restart">🔄 再开一局</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
